query NightbirdsScrims($after: String, $from: String!) {
  allSeries(
    first: 50
    after: $after
    filter: {
      titleId: "3"
      teamId: "54472"
      types: SCRIM
      startTimeScheduled: { gte: $from }
      workflowStatuses: [PUBLISHED]
    }
    orderBy: StartTimeScheduled
    orderDirection: DESC
  ) {
    totalCount
    pageInfo {
      hasNextPage
      endCursor
    }
    edges {
      node {
        id
        startTimeScheduled
        type
        workflowStatus
        private
        title { id name nameShortened }
        tournament { id name nameShortened }
        format { id name nameShortened }
        teams { baseInfo { id name } scoreAdvantage }
      }
    }
  }
}
